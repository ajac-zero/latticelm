server:
  address: ":8080"

logging:
  format: "text"  # text format for easy reading in development
  level: "debug"  # debug level to see all logs

rate_limit:
  enabled: false  # disabled for testing
  redis_url: ""
  requests_per_second: 100
  burst: 200

providers:
  mock:
    type: "openai"
    api_key: "test-key"
    endpoint: "https://api.openai.com"

models:
  - name: "gpt-4o-mini"
    provider: "mock"

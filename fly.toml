# fly.toml app configuration file generated for latticelm on 2026-03-08T23:17:17-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'latticelm'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[files]]
  guest_path = "/app/config/config.yaml"
  secret_name = "APP_CONFIG"

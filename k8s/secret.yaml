# External Secrets Operator configuration for llm-gateway
# Docs: https://external-secrets.io/latest/
#
# This file defines a SecretStore and ExternalSecret that pull secrets from an
# external provider (AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager,
# etc.) so that no plaintext credentials are stored in version control.
#
# Prerequisites:
#   1. Install External Secrets Operator: https://external-secrets.io/latest/introduction/getting-started/
#   2. Configure the SecretStore provider below for your target environment.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: llm-gateway-secret-store
  namespace: llm-gateway
  labels:
    app: llm-gateway
spec:
  provider:
    # TODO: Configure for your environment. Examples:
    #
    # AWS Secrets Manager:
    #   aws:
    #     service: SecretsManager
    #     region: us-east-1
    #     auth:
    #       secretRef:
    #         accessKeyIDSecretRef:
    #           name: aws-credentials
    #           key: access-key-id
    #         secretAccessKeySecretRef:
    #           name: aws-credentials
    #           key: secret-access-key
    #
    # HashiCorp Vault:
    #   vault:
    #     server: "https://vault.example.com"
    #     path: "secret"
    #     version: "v2"
    #     auth:
    #       kubernetes:
    #         mountPath: "kubernetes"
    #         role: "llm-gateway"
    #
    # GCP Secret Manager:
    #   gcpsm:
    #     projectID: my-gcp-project
    #     auth:
    #       workloadIdentity:
    #         clusterLocation: us-central1
    #         clusterName: my-cluster
    #         serviceAccountRef:
    #           name: gcp-sa
    {}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-gateway-external-secret
  namespace: llm-gateway
  labels:
    app: llm-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: llm-gateway-secret-store
    kind: SecretStore
  target:
    name: llm-gateway-secrets
    creationPolicy: Owner
  data:
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: prod/llm-gateway/GOOGLE_API_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: prod/llm-gateway/ANTHROPIC_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: prod/llm-gateway/OPENAI_API_KEY
    - secretKey: OIDC_AUDIENCE
      remoteRef:
        key: prod/llm-gateway/OIDC_AUDIENCE

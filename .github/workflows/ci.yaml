name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.26.1'
  TRIVY_VERSION: '0.63.0'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Create frontend dist placeholder
      run: mkdir -p internal/ui/dist && echo '<html></html>' > internal/ui/dist/index.html

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella

    - name: Generate coverage report
      run: go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage report
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: coverage-report
        path: coverage.html

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Create frontend dist placeholder
      run: mkdir -p internal/ui/dist && echo '<html></html>' > internal/ui/dist/index.html

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
      with:
        version: v1.64.7
        install-mode: goinstall
        only-new-issues: true
        args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Create frontend dist placeholder
      run: mkdir -p internal/ui/dist && echo '<html></html>' > internal/ui/dist/index.html

    - name: Install Gosec
      run: go install github.com/securego/gosec/v2/cmd/gosec@latest

    - name: Run Gosec Security Scanner
      run: gosec -fmt sarif -out results.sarif ./...
      continue-on-error: ${{ github.event_name == 'pull_request' }}

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
      if: always() && hashFiles('results.sarif') != ''
      with:
        sarif_file: results.sarif

    - name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...
      continue-on-error: ${{ github.event_name == 'pull_request' }}

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@f586c14365d4643c6aa59d472ae6e984bf47bb34 # v2.3.8
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [test, lint]

    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

    - name: Build Docker image for scanning
      uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
      with:
        context: .
        load: true
        tags: latticelm:security-scan
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scanner
      id: trivy
      continue-on-error: ${{ github.event_name == 'pull_request' }}
      run: |
        mkdir -p "${{ github.workspace }}/.cache/trivy"
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "${{ github.workspace }}:/work" \
          -v "${{ github.workspace }}/.cache/trivy:/root/.cache/" \
          aquasec/trivy:${{ env.TRIVY_VERSION }} image \
          --format sarif \
          --output /work/trivy-results.sarif \
          --severity HIGH,CRITICAL \
          --exit-code 1 \
          latticelm:security-scan

    - name: Upload Trivy results to GitHub Security
      if: always() && hashFiles('trivy-results.sarif') != ''
      uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
      with:
        sarif_file: trivy-results.sarif

    - name: Fail on HIGH or CRITICAL image vulnerabilities
      if: steps.trivy.outcome == 'failure' && github.event_name != 'pull_request'
      run: exit 1

  docker-amd64:
    name: Build Docker Image (AMD64)
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

    - name: Log in to Container Registry
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push AMD64 image
      id: build
      uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
      with:
        context: .
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        provenance: false
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

  docker-arm64:
    name: Build Docker Image (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: [test, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

    - name: Log in to Container Registry
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push ARM64 image
      id: build
      uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
      with:
        context: .
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/arm64
        provenance: false
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

  docker-merge:
    name: Merge Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [docker-amd64, docker-arm64]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

    - name: Log in to Container Registry
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create multi-arch manifest
      run: |
        IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        BRANCH="${GITHUB_REF#refs/heads/}"
        SHA="${{ github.sha }}"
        
        # Create manifest for branch tag
        docker buildx imagetools create -t "${IMAGE}:${BRANCH}" \
          "${IMAGE}@${{ needs.docker-amd64.outputs.digest }}" \
          "${IMAGE}@${{ needs.docker-arm64.outputs.digest }}"
        
        # Create manifest for SHA tag
        docker buildx imagetools create -t "${IMAGE}:${BRANCH}-${SHA}" \
          "${IMAGE}@${{ needs.docker-amd64.outputs.digest }}" \
          "${IMAGE}@${{ needs.docker-arm64.outputs.digest }}"
        
        # Create latest manifest for main branch
        if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
          docker buildx imagetools create -t "${IMAGE}:latest" \
            "${IMAGE}@${{ needs.docker-amd64.outputs.digest }}" \
            "${IMAGE}@${{ needs.docker-arm64.outputs.digest }}"
        fi
